<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodminton – Stats</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏸</text></svg>">
<link rel="stylesheet" href="style.css">
<style>
  #stats-wrap { padding: 12px; }
  .st-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .st-header h2 { font-size: 15px; color: #fff; flex: 1; }
  #refresh-btn { background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: bold; cursor: pointer; }
  #refresh-btn:disabled { background: #555; cursor: default; }
  .st-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .st-table th { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; text-align: left; padding: 5px 8px; border-bottom: 1px solid #0f3460; }
  .st-table th.num { text-align: right; }
  .st-table td { padding: 7px 8px; border-bottom: 1px solid #0a0a20; color: #ccc; }
  .st-table td.num { text-align: right; color: #e94560; font-weight: bold; font-size: 15px; }
  .st-table tr:hover td { background: #16213e; }
  .st-klubb { font-size: 11px; color: #666; margin-top: 1px; }
  .st-found { color: #7fffd4; }
  .st-not-found { color: #e94560; }
  #status { color: #888; font-style: italic; font-size: 13px; text-align: center; padding: 20px 0; }
  .st-sum { font-size: 11px; color: #555; margin-top: 10px; text-align: right; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🏸 Goodminton</h1>
  <div class="tagline">goodminton.no — statistikk</div>
</div>

<div id="stats-wrap">
  <div class="st-header">
    <h2>Søk siste 30 dager</h2>
    <button id="refresh-btn" onclick="lastStats()">Last inn</button>
  </div>
  <div id="status">Trykk "Last inn" for å hente data.</div>
  <table class="st-table" id="st-table" style="display:none">
    <thead>
      <tr>
        <th>Spiller</th>
        <th class="num">Søk</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="st-tbody"></tbody>
  </table>
  <div class="st-sum" id="st-sum"></div>
</div>

<script>
const WORKER = 'https://spillerkort-proxy.chho84.workers.dev';

async function lastStats() {
  const btn = document.getElementById('refresh-btn');
  const status = document.getElementById('status');
  const table = document.getElementById('st-table');
  btn.disabled = true;
  btn.textContent = '⏳ Henter...';
  status.textContent = 'Henter data...';
  status.style.display = 'block';
  table.style.display = 'none';

  try {
    const r = await fetch(WORKER + '/stats');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();

    const rows = data.data || [];
    if (!rows.length) { status.textContent = 'Ingen data ennå.'; return; }

    const tbody = document.getElementById('st-tbody');
    tbody.innerHTML = '';
    let total = 0;

    rows.forEach(function(row) {
      const navn = row.navn || '–';
      const klubb = row.klubb || '';
      const resultat = row.resultat || '';
      const antall = row.antall || 0;
      total += antall;

      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td><div>' + esc(navn) + '</div><div class="st-klubb">' + esc(klubb) + '</div></td>' +
        '<td class="num">' + antall + '</td>' +
        '<td class="' + (resultat === 'found' ? 'st-found' : 'st-not-found') + '">' +
          (resultat === 'found' ? '✓ Funnet' : '✗ Ikke funnet') +
        '</td>';
      tbody.appendChild(tr);
    });

    status.style.display = 'none';
    table.style.display = 'table';
    document.getElementById('st-sum').textContent = 'Totalt ' + total + ' søk';
  } catch(e) {
    status.textContent = 'Feil: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Oppdater';
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
