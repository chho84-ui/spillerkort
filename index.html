<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Goodminton – Spillerkort</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <h1>🏸 Goodminton</h1>
  <div class="tagline">goodminton.no — ditt badminton-spillerkort</div>
</div>

<div id="infoboks">
  <p>Søk opp deg selv for å se <strong>ranking</strong> i alle grener, <strong>påmeldinger</strong> til kommende turneringer og <strong>kampprogram</strong> med motstandernes ranking og alder. Trykk på en motstander for å hente opp deres spillerkort.</p>
</div>

<div id="formkort">
  <label>Spillernavn (fullt)
    <input id="f-navn" type="text" placeholder="Ola Nordmann" autocomplete="off">
  </label>
  <label>Klubb
    <input id="f-klubb" type="text" placeholder="Sotra" autocomplete="off">
  </label>
  <button id="hent-btn" onclick="hent()">🔍 Hent spillerkort</button>
</div>

<div id="resultat">
  <div class="sk-status" id="st">Fyll inn spillerinfo og trykk Hent.</div>
</div>

<script src="app.js"></script>

</body>
</html>
