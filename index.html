<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 Spillerkort</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, Roboto, sans-serif; font-size: 15px; min-height: 100vh; }

  #topbar { background: #16213e; padding: 12px 16px; border-bottom: 2px solid #0f3460; display: flex; align-items: center; gap: 10px; }
  #topbar h1 { font-size: 18px; color: #e94560; flex: 1; }

  #formkort { background: #16213e; padding: 14px 16px; border-bottom: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; }
  #formkort label { font-size: 11px; color: #888; display: flex; flex-direction: column; gap: 4px; }
  #formkort input { background: #0a0a1e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; padding: 8px 10px; font-size: 14px; width: 100%; }
  #formkort input:focus { outline: none; border-color: #e94560; }
  #formrad { display: flex; gap: 8px; }
  #formrad label { flex: 1; }
  #hent-btn { width: 100%; background: #e94560; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 4px; }
  #hent-btn:active { background: #c73450; }
  #hent-btn:disabled { background: #555; cursor: default; }

  #resultat { padding: 12px; }
  .sk-status { color: #aaa; font-style: italic; padding: 8px 0; font-size: 13px; text-align: center; }
  .sk-sek { margin-bottom: 10px; }
  .sk-sek h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #fff; background: #0f3460; padding: 5px 10px; border-left: 3px solid #e94560; margin: 0 0 8px; }
  .sk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
  .sk-chip { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 8px; text-align: center; }
  .sk-chip .r-d { font-size: 9px; color: #888; }
  .sk-chip .r-k { font-size: 10px; color: #ccc; }
  .sk-chip .r-p { font-size: 20px; font-weight: bold; color: #e94560; }
  .sk-t { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .sk-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid #0f3460; }
  .sk-bk { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #0f3460; white-space: nowrap; }
  .sk-bk.ok { background: #1a7a4e; color: #7fffd4; }
  .sk-disc { flex: 1; font-size: 13px; }
  .sk-makker { font-size: 11px; color: #888; }
  .sk-btn { display: block; text-align: center; background: #e94560; color: #fff; text-decoration: none; padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 12px; font-weight: bold; }
  .sk-kamplist { margin-top: 8px; border-top: 1px solid #0f3460; padding-top: 6px; }
  .sk-kamp { display: flex; gap: 6px; padding: 4px 0; border-bottom: 1px solid #0a0a20; font-size: 12px; align-items: center; }
  .sk-kamp-tid { color: #53d8fb; font-weight: bold; min-width: 48px; }
  .sk-kamp-bane { color: #888; min-width: 32px; }
  .sk-kamp-disc { color: #aaa; min-width: 28px; font-size: 10px; }
  .sk-kamp-mot { flex: 1; color: #e0e0e0; }
  .sk-kamp-res { color: #7fffd4; min-width: 50px; text-align: right; }
  .sk-rank-mini { font-size: 9px; background: #0f3460; color: #e94560; padding: 1px 4px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🏸 Spillerkort</h1>
</div>

<div id="formkort">
  <label>Spillernavn (fullt)
    <input id="f-navn" type="text" placeholder="Ola Nordmann" autocomplete="off">
  </label>
  <label>Klubb
    <input id="f-klubb" type="text" placeholder="Sotra" autocomplete="off">
  </label>
  <button id="hent-btn" onclick="hent()">🔍 Hent spillerkort</button>
</div>

<div id="resultat">
  <div class="sk-status" id="st">Fyll inn spillerinfo og trykk Hent.</div>
</div>

<script>
var PROXY = 'https://spillerkort-proxy.chho84.workers.dev';

var SN, SI, SK, SS;

function lagre() {
  localStorage.setItem('sk_navn', document.getElementById('f-navn').value);
  localStorage.setItem('sk_klubb',document.getElementById('f-klubb').value);
}

function laster() {
  var n = localStorage.getItem('sk_navn');
  var k = localStorage.getItem('sk_klubb');
  if (n) document.getElementById('f-navn').value = n;
  if (k) document.getElementById('f-klubb').value = k;
}

function sokSpiller(navn, klubb) {
  return fetch(PROXY + '/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ navn: navn, klubb: klubb })
  }).then(function(r) { return r.json(); });
}

function api(method, data) {
  return fetch(PROXY + '/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method: method, data: data })
  }).then(function(r) { return r.json(); });
}

function appApi(data) {
  return fetch(PROXY + '/app', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

function cup2000Api(tournamentid) {
  return fetch(PROXY + '/cup2000', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tournamentid: tournamentid, navn: SN, klubb: SK })
  }).then(function(r) { return r.json(); });
}

function hentRanking() {
  return api('GetPlayerProfile', {
    seasonid: SS, playerid: SI,
    getplayerdata: false, showUserProfile: true, showheader: false
  }).then(function(res) {
    var html = String((res.d && res.d.Html) || res.d || '');
    var rows = [];
    var dp = new DOMParser();
    var doc = dp.parseFromString(html, 'text/html');
    var trs = doc.querySelectorAll('table tr');
    for (var i = 0; i < trs.length; i++) {
      var tds = trs[i].querySelectorAll('td');
      if (tds.length >= 2) {
        var cells = [];
        for (var j = 0; j < tds.length; j++) cells.push(tds[j].textContent.trim());
        var last = cells[cells.length - 1];
        if (/^\d+$/.test(last)) rows.push({ disiplin: cells[0], klasse: cells[1] || '', plass: last });
      }
    }
    return rows;
  });
}

function finnTurneringer() {
  var now = new Date();
  var dd = String(now.getDate()).padStart(2, '0');
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var yyyy = now.getFullYear();
  var fra = dd + '.' + mm + '.' + yyyy;

  return api('GetSeasonPlan', {
    seasonid: SS, regionids: null, agegroupids: null, classids: null,
    strfrom: fra, strto: '31.12.' + yyyy,
    strweekno: '', strweekno2: '', georegionids: null,
    clubid: '', disciplines: null, playerid: null,
    birthdate: null, age: null, points: null, gender: null,
    publicseasonplan: true, showleague: false,
    selectclientfunction: 'SeasonPlan.SelectTournament', page: 0
  }).then(function(res) {
    var html = String((res.d && (res.d.html || res.d.Html)) || res.d || '');
    var kmap = {};
    var re = /SeasonPlan\.SelectTournament\((\d+),\s*(\d+)\)/g;
    var m;
    while ((m = re.exec(html)) !== null) {
      var tid = m[1], cid = m[2];
      if (!kmap[tid]) kmap[tid] = { klasser: [], navn: '', dato: '', cup2000Url: '' };
      if (kmap[tid].klasser.indexOf(cid) === -1) kmap[tid].klasser.push(cid);
    }
    var dp2 = new DOMParser();
    var doc2 = dp2.parseFromString(html, 'text/html');
    var trs2 = doc2.querySelectorAll('tr[onclick]');
    for (var i = 0; i < trs2.length; i++) {
      var oc = trs2[i].getAttribute('onclick');
      var idM = oc && oc.match(/SelectTournament\((\d+),/);
      if (!idM) continue;
      var tid2 = idM[1];
      if (!kmap[tid2] || kmap[tid2].navn) continue;
      var tekst = trs2[i].textContent.replace(/\s+/g, ' ').trim();
      var dm = tekst.match(/\d{2}\.\d{2}\.\d{4}/);
      kmap[tid2].dato = dm ? dm[0] : '';
      kmap[tid2].navn = tekst.substring(0, 80);
    }
    var tids = Object.keys(kmap);
    sett('Sjekker ' + tids.length + ' turneringer...');

    return Promise.all(tids.map(function(tid) {
      var info = kmap[tid];
      return hentAlleKlasser(tid).then(function(alleKlasser) {
        info.klasser = alleKlasser;
        return sjekkTurnering(tid, info);
      });
    })).then(function(resultater) {
      return resultater.filter(function(r) { return r !== null; });
    });
  });
}

function hentAlleKlasser(tournamentId) {
  return appApi({ command: 18, unionid: 200, tournamentid: parseInt(tournamentId), commandversion: 6 })
    .then(function(data) {
      var results = data.searchresult || [];
      var ids = [];
      for (var i = 0; i < results.length; i++) {
        var classId = results[i][1];
        if (classId && parseInt(classId) > 0) ids.push(String(classId));
      }
      return ids.length > 0 ? ids : [String(tournamentId)];
    })
    .catch(function() { return [String(tournamentId)]; });
}

function sjekkTurnering(tid, info) {
  return Promise.all(info.klasser.map(function(cid) {
    return api('SearchRegistrationsByClass', {
      tournamentclassid: parseInt(cid),
      clientselectfunction: 'SelectTournamentClass1'
    }).then(function(res) {
      var html = String((res.d && res.d.Html) || '');
      if (html.indexOf(SI) === -1 && html.indexOf(SN) === -1) return [];
      var cupM = html.match(/cup2000\.dk[^\s"']*/i);
      if (cupM && !info.cup2000Url) info.cup2000Url = 'https://' + cupM[0];
      return parseKlasse(html);
    }).catch(function() { return []; });
  })).then(function(alleRegs) {
    var regs = [];
    for (var i = 0; i < alleRegs.length; i++) {
      for (var j = 0; j < alleRegs[i].length; j++) regs.push(alleRegs[i][j]);
    }
    if (!regs.length) return null;
    return { tournamentId: tid, registreringer: regs, navn: info.navn, dato: info.dato, cup2000Url: info.cup2000Url };
  });
}

function parseKlasse(html) {
  var results = [];
  var dp = new DOMParser();
  var doc = dp.parseFromString(html, 'text/html');
  var h3s = doc.querySelectorAll('h3');
  for (var i = 0; i < h3s.length; i++) {
    var disiplin = h3s[i].textContent.trim();
    var table = h3s[i].nextElementSibling;
    if (!table) continue;
    var trs = table.querySelectorAll('tr');
    var candidateRows = [];
    for (var j = 0; j < trs.length; j++) {
      var tr = trs[j];
      var links = tr.querySelectorAll('a[href*="VisSpiller"]');
      var hasPlayer = false;
      var makkere = [];
      var isXmakker = tr.innerHTML.indexOf('X-makker') !== -1;
      for (var k = 0; k < links.length; k++) {
        var href = links[k].getAttribute('href') || '';
        var name = links[k].textContent.trim();
        if (href.indexOf('VisSpiller/#' + SI) !== -1 || name === SN) {
          hasPlayer = true;
        } else if (name) {
          makkere.push(name);
        }
      }
      if (hasPlayer) {
        candidateRows.push({ makkere: makkere, isXmakker: isXmakker, tr: tr });
      }
    }
    if (candidateRows.length) {
      // Foretrekk rad med ekte makker fremfor X-makker
      var best = candidateRows.find(function(c) { return !c.isXmakker && c.makkere.length > 0; })
        || candidateRows.find(function(c) { return !c.isXmakker; })
        || candidateRows[0];
      var makkere = best.isXmakker && !best.makkere.length ? ['X-makker'] : best.makkere;
      results.push({ disiplin: disiplin, makkere: makkere, bekreftet: best.tr.innerHTML.indexOf('checkmark.gif') !== -1 });
    }
  }
  return results;
}

function hentMotstanderRanking(navn, disc) {
  return api('SearchPlayer', {
    selectfunction: 'SP1', name: navn, clubid: '', playernumber: '',
    gender: '', agegroupid: '', searchteam: false, licenseonly: false,
    agegroupcontext: 0, tournamentdate: ''
  }).then(function(res) {
    var hmHtml = String((res.d && (res.d.Html || res.d.html)) || '');
    var pidM = hmHtml.match(/SP1\('(\d+)'/);
    if (!pidM) return null;
    return api('GetPlayerProfile', {
      seasonid: SS, playerid: pidM[1],
      getplayerdata: false, showUserProfile: true, showheader: false
    }).then(function(res2) {
      var html2 = String((res2.d && res2.d.Html) || '');
      var dp3 = new DOMParser();
      var doc3 = dp3.parseFromString(html2, 'text/html');
      var trs3 = doc3.querySelectorAll('table tr');
      var discKey = disc ? disc.toUpperCase().substring(0, 2) : '';
      var discMap = {HS:'Herre',DS:'Dame',HD:'Herre',DD:'Dame',MD:'Mixed'};
      var discFull = discMap[discKey] || '';
      for (var ri = 0; ri < trs3.length; ri++) {
        var tds3 = trs3[ri].querySelectorAll('td');
        if (tds3.length >= 2) {
          var cells3 = [];
          for (var rj = 0; rj < tds3.length; rj++) cells3.push(tds3[rj].textContent.trim());
          var last3 = cells3[cells3.length - 1];
          if (/^\d+$/.test(last3) && discFull && cells3[0].indexOf(discFull) !== -1) {
            return { plass: last3, klasse: cells3[1] || '' };
          }
        }
      }
      return null;
    });
  }).catch(function() { return null; });
}

function sett(tekst) {
  document.getElementById('st').textContent = tekst;
}

function visRanking(rows) {
  if (!rows || !rows.length) return;
  var res = document.getElementById('resultat');
  var sec = document.createElement('div');
  sec.className = 'sk-sek';
  sec.innerHTML = '<h3>Ranking</h3><div class="sk-grid" id="sk-rg"></div>';
  res.appendChild(sec);
  var grid = document.getElementById('sk-rg');
  for (var i = 0; i < rows.length; i++) {
    var c = document.createElement('div');
    c.className = 'sk-chip';
    c.innerHTML = '<div class="r-d">' + rows[i].disiplin + '</div>'
      + '<div class="r-k">' + rows[i].klasse + '</div>'
      + '<div class="r-p">#' + rows[i].plass + '</div>';
    grid.appendChild(c);
  }
}

function discTilKode(disc) {
  var d = (disc || '').toLowerCase();
  if (d.indexOf('mixed') !== -1) return 'MD';
  if (d.indexOf('herredouble') !== -1 || d.indexOf('herre double') !== -1) return 'HD';
  if (d.indexOf('damedouble') !== -1 || d.indexOf('dame double') !== -1) return 'DD';
  if (d.indexOf('herresingle') !== -1) return 'HS';
  if (d.indexOf('damesingle') !== -1) return 'DS';
  return disc ? disc.substring(0, 2).toUpperCase() : '';
}

function visTurnering(t) {
  var res = document.getElementById('resultat');
  var sec = document.createElement('div');
  sec.className = 'sk-sek';
  sec.innerHTML = '<h3>' + (t.dato || '') + ' ' + (t.navn || 'Turnering') + '</h3>';
  res.appendChild(sec);
  var div = document.createElement('div');
  div.className = 'sk-t';
  var rh = '';
  for (var i = 0; i < t.registreringer.length; i++) {
    var r = t.registreringer[i];
    var makkerHtml = '';
    if (r.makkere.length) {
      if (r.makkere[0] === 'X-makker') {
        makkerHtml = '<span class="sk-makker">(uten makker)</span>';
      } else {
        makkerHtml = '<span class="sk-makker">m/ ' + r.makkere.join(', ')
          + ' <span class="sk-rank-mini" id="sk-mkr-' + t.tournamentId + '-' + i + '"></span></span>';
      }
    }
    rh += '<div class="sk-row">'
      + '<span class="sk-bk' + (r.bekreftet ? ' ok' : '') + '">' + (r.bekreftet ? 'OK' : '?') + '</span>'
      + '<span class="sk-disc">' + r.disiplin + '</span>'
      + makkerHtml
      + '</div>';
  }
  var kampDiv = '<div id="sk-kl-' + t.tournamentId + '" class="sk-kamplist"><div style="font-size:11px;color:#555;text-align:center">Laster kampprogram...</div></div>';
  var fallbackBtn = t.cup2000Url ? '<a class="sk-btn" href="' + t.cup2000Url + '&search=1" target="_blank" style="margin-top:4px;font-size:11px;background:#0f3460">Åpne i Cup2000</a>' : '';
  if (t.cup2000Url) {
    div.innerHTML = rh + kampDiv + fallbackBtn;
  } else {
    div.innerHTML = rh + '<div style="font-size:11px;color:#555;text-align:center;margin-top:8px">Program ikke publisert ennå</div>';
  }
  res.appendChild(div);

  // Hent ranking for makkere asynkront
  for (var mi = 0; mi < t.registreringer.length; mi++) {
    (function(reg, idx) {
      if (!reg.makkere.length || reg.makkere[0] === 'X-makker') return;
      var kode = discTilKode(reg.disiplin);
      hentMotstanderRanking(reg.makkere[0], kode).then(function(ranking) {
        if (!ranking) return;
        var el = document.getElementById('sk-mkr-' + t.tournamentId + '-' + idx);
        if (el) el.textContent = '#' + ranking.plass;
      });
    })(t.registreringer[mi], mi);
  }

  if (t.cup2000Url) {
    var tidM = t.cup2000Url.match(/tournamentid=(\d+)/i);
    if (tidM) {
      cup2000Api(tidM[1]).then(function(data) {
        var kl = document.getElementById('sk-kl-' + t.tournamentId);
        if (!kl) return;
        var kamper = data && data.html ? parseKamper(data.html) : [];
        if (!kamper.length) {
          kl.innerHTML = '<div style="font-size:11px;color:#555;text-align:center">Ingen kamptider funnet</div>';
          return;
        }
        var kh = '';
        for (var i = 0; i < kamper.length; i++) {
          var k = kamper[i];
          kh += '<div class="sk-kamp">'
            + '<span class="sk-kamp-tid">' + (k.tid || '--:--') + '</span>'
            + '<span class="sk-kamp-bane">' + (k.bane || '') + '</span>'
            + '<span class="sk-kamp-disc">' + (k.disc || '') + '</span>'
            + '<span class="sk-kamp-mot" id="sk-mot-' + t.tournamentId + '-' + i + '">' + (k.mot || '') + '</span>'
            + (k.res ? '<span class="sk-kamp-res">' + k.res + '</span>' : '')
            + '</div>';
        }
        kl.innerHTML = kh;
        for (var mi = 0; mi < kamper.length; mi++) {
          (function(kamp, idx) {
            if (!kamp.mot) return;
            hentMotstanderRanking(kamp.mot, kamp.disc).then(function(ranking) {
              if (!ranking) return;
              var motEl = document.getElementById('sk-mot-' + t.tournamentId + '-' + idx);
              if (!motEl) return;
              var chip = document.createElement('span');
              chip.className = 'sk-rank-mini';
              chip.textContent = '#' + ranking.plass;
              motEl.appendChild(chip);
            });
          })(kamper[mi], mi);
        }
      });
    }
  }
}

function parseKamper(html) {
  var dp = new DOMParser();
  var doc = dp.parseFromString(html, 'text/html');
  var kamper = [];
  var rows = doc.querySelectorAll('table tr');
  for (var i = 0; i < rows.length; i++) {
    var tds = rows[i].querySelectorAll('td');
    if (tds.length < 4) continue;
    var rowTxt = rows[i].textContent;
    if (rowTxt.indexOf(SN) === -1 && rowTxt.indexOf(SK) === -1) continue;
    var cells = [];
    for (var j = 0; j < tds.length; j++) cells.push(tds[j].textContent.trim());
    var tid = '', bane = '', disc = '', mot = '', res = '';
    for (var k = 0; k < cells.length; k++) {
      if (/^\d{2}:\d{2}$/.test(cells[k])) tid = cells[k];
      else if (/^[A-Za-z]\d+$/.test(cells[k]) || /^\d+$/.test(cells[k])) bane = cells[k];
      else if (/^(HS|DS|HD|DD|MD|MX)/i.test(cells[k])) disc = cells[k];
      else if (cells[k].length > 3 && cells[k].indexOf(SN) === -1 && cells[k] !== SK) mot = cells[k];
      else if (/\d+-\d+/.test(cells[k])) res = cells[k];
    }
    if (tid || mot) kamper.push({ tid: tid, bane: bane, disc: disc, mot: mot, res: res });
  }
  return kamper;
}

function hent() {
  SN = document.getElementById('f-navn').value.trim();
  SK = document.getElementById('f-klubb').value.trim();

  if (!SN || !SK) { sett('Fyll inn navn og klubb.'); return; }

  lagre();

  var now0 = new Date();
  var seasonStart = now0.getMonth() >= 7 ? now0.getFullYear() : now0.getFullYear() - 1;
  SS = '200' + seasonStart;

  var btn = document.getElementById('hent-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Henter...';

  var res = document.getElementById('resultat');
  res.innerHTML = '<div class="sk-status" id="st">Søker etter spiller...</div>';

  sokSpiller(SN, SK).then(function(data) {
    if (data.error || !data.playerid) {
      sett('Fant ikke spiller: ' + SN + ' / ' + SK);
      btn.disabled = false;
      btn.textContent = '🔍 Hent spillerkort';
      return;
    }
    SI = data.playerid;
    sett('Henter spillerinfo...');
    return Promise.all([hentRanking(), finnTurneringer()]).then(function(d) {
      sett('');
      visRanking(d[0]);
      if (!d[1].length) {
        sett('Ingen kommende turneringer funnet.');
      } else {
        d[1].forEach(visTurnering);
      }
    });
  }).catch(function(e) {
    sett('Feil: ' + e.message);
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = '🔍 Hent spillerkort';
  });
}

window.onload = laster;
</script>
</body>
</html>
